<!DOCTYPE html>
<html lang="es">
<head> 
<meta charset="UTF-8"> 
<title>Promedio de tres notas</title> 
</head> 
<body> 
	<h2>Promedio de tres notas</h2> 
	<form> 
		<label>Nota 1:</label> 
		<input type="number" id="nota1"><br><br>
		<label>Nota 2:</label> 
		<input type="number" id="nota2"><br><br> 
		<label>Nota 3:</label> <input type="number" id="nota3"><br><br>
		<input type="button" value="Calcular" onclick="promedio()"> </form>
	<h3 id="resultado"></h3> 
	<script> 
		function promedio() { 
			let n1 = parseFloat(document.getElementById("nota1").value); 
			let n2 = parseFloat(document.getElementById("nota2").value);
			let n3 = parseFloat(document.getElementById("nota3").value); 
			let prom = (n1 + n2 + n3) / 3; 
			if (prom >= 11) {
				document.getElementById("resultado").innerHTML = "Promedio: " + prom + " Aprobado";
				document.getElementById("resultado").style.color = "blue"; 
			} else { 
				document.getElementById("resultado").innerHTML = "Promedio: " + prom + " Desaprobado"; 
				document.getElementById("resultado").style.color = "red";
			} 

	}  
</script> 
</body> 
</html>
