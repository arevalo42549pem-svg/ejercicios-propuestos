<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Verificar número</title>
</head>
<body>

<h2>Verificar si un número es positivo, negativo o cero</h2>

<form>
    <label>Ingrese un número:</label>
    <input type="number" id="numero"><br><br>

    <input type="button" value="Verificar" onclick="verificar()">
</form>

<h3 id="resultado"></h3>

<script>
function verificar() {
    let n = parseFloat(document.getElementById("numero").value);

    if (n > 0) {
        document.getElementById("resultado").innerHTML = "El número es positivo";
    } else if (n < 0) {
        document.getElementById("resultado").innerHTML = "El número es negativo";
    } else {
        document.getElementById("resultado").innerHTML = "El número es cero";
    }
}
</script>

</body>
</html>
