<!DOCTYPE html>
 <html lang="es"> 
 <head> 
 	<meta charset="UTF-8"> 
 	<title>Conversión Celsius a Fahrenheit</title> 
 	<style> 
 	body{ font-family: Arial; background:#f2f2f2; } 
 	.contenedor{ 
 		width:350px; 
 		margin:auto; 
 		margin-top:50px; 
 		background:white; 
 		padding:20px; 
 		border-radius:15px; 
 		box-shadow:0 0 10px gray; }
 h2{ text-align:center; } 
input{ width:90%; padding:8px; margin:8px 0; } 
button{ width:100%; padding:10px; background:blue; color:white; border:none; border-radius:5px; } 
</style>
</head>
<body> 
	<div class="contenedor"> 
		<h2>Convertir Celsius a Fahrenheit</h2> 
		Ingrese grados Celsius: 
		<input type="number" id="celsius"> 
		<button onclick="convertir()">Convertir</button> 
		<h3 id="resultado"></h3> 
	</div> 
	<script> 
	function convertir() { 
	let c = parseFloat(document.getElementById("celsius").value); 
    let f = (c * 9/5) + 32; 
    document.getElementById("resultado").innerHTML = "Temperatura en Fahrenheit: " + f; 
    document.getElementById("resultado").style.color = "blue"; } 
</script> 
</body> 

</html>
